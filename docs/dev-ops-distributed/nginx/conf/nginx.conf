worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 启用 WebSocket 支持（map 指令必须放在 http 块中）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 定义后端负载均衡上游（通过 docker 网络访问）
    upstream ai-mcp-gateway-backend {
        server ai-mcp-gateway-app-01:8777 weight=1;
        server ai-mcp-gateway-app-02:8777 weight=1;
    }

    server {
        listen       80;
        server_name  localhost;

        # 客户端请求体大小限制
        client_max_body_size 50m;

        # 静态资源（前端页面）
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # API 反向代理到后端负载均衡
        location /api-gateway/ {
            # 保留 WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 代理请求头
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时配置
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # 转发到后端负载均衡（不带末尾 /，保留 /api-gateway 前缀传给后端）
            proxy_pass http://ai-mcp-gateway-backend;
        }

        # 健康检查接口
        location /nginx-health {
            access_log off;
            return 200 "healthy";
            add_header Content-Type text/plain;
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
