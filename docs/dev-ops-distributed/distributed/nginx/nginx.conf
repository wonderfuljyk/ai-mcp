worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 启用 WebSocket 支持（map 指令必须放在 http 块中）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 定义负载均衡 upstream
    upstream ai-mcp-gateway-backend {
        # 使用 ip_hash 保证会话一致性，或者使用轮询（默认）
        # ip_hash;

        # 两个应用实例
        server ai-mcp-gateway-app-01:8777 weight=1;
        server ai-mcp-gateway-app-02:8777 weight=1;
    }

    server {
        listen       80;
        server_name  localhost;

        # 客户端请求体大小限制
        client_max_body_size 50m;

        # 代理超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 代理请求头配置
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # 静态资源（如有）
        location /static/ {
            alias   /usr/share/nginx/html/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 所有 API 请求转发到后端负载均衡
        location / {
            proxy_pass         http://ai-mcp-gateway-backend;
            proxy_http_version 1.1;
        }

        # 健康检查接口（Nginx 自身健康）
        location /nginx-health {
            access_log off;
            return 200 "healthy";
            add_header Content-Type text/plain;
        }

        # 错误页面
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
